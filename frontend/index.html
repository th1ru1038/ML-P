<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Film Recommender</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ── Reset & base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0f14;
      --surface:     #13161e;
      --surface-2:   #1a1e2a;
      --border:      #252b3b;
      --accent:      #c9a96e;
      --accent-soft: rgba(201, 169, 110, 0.12);
      --text:        #e8e4da;
      --text-muted:  #5c6272;
      --error:       #e06c75;
      --error-soft:  rgba(224, 108, 117, 0.10);
      --radius:      12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4rem 1.5rem 6rem;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent-soft);
      border: 1px solid rgba(201, 169, 110, 0.25);
      margin-bottom: 1rem;
    }

    .logo svg {
      width: 24px;
      height: 24px;
      fill: var(--accent);
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ── Card ────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
    }

    .card-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    /* ── Input row ───────────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 0.625rem;
    }

    .input-wrap {
      position: relative;
      flex: 1;
    }

    .input-at {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.95rem;
      pointer-events: none;
      user-select: none;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.7rem 0.875rem 0.7rem 1.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]::placeholder { color: var(--text-muted); }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    button#submit-btn {
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.7rem 1.25rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, box-shadow 0.15s, opacity 0.15s;
    }

    button#submit-btn:hover:not(:disabled) {
      background: #d4b47a;
      box-shadow: 0 0 18px rgba(201, 169, 110, 0.25);
    }

    button#submit-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ── Divider ─────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* ── States ──────────────────────────────────────────────────── */
    .state { display: none; }
    .state.visible { display: block; }

    /* Loading */
    .loading-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 0 0.5rem;
      text-align: center;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(201, 169, 110, 0.18);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .loading-text strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    /* Results */
    .results-header {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .results-header span {
      color: var(--accent);
    }

    .film-list {
      list-style: none;
    }

    .film-item {
      display: flex;
      align-items: baseline;
      gap: 0.875rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.3s ease both;
    }

    .film-item:last-child { border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .film-num {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 1.4rem;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .film-title {
      font-size: 0.925rem;
      color: var(--text);
    }

    /* Error */
    .error-inner {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      background: var(--error-soft);
      border: 1px solid rgba(224, 108, 117, 0.2);
      border-radius: 8px;
      padding: 1rem 1.125rem;
    }

    .error-icon {
      color: var(--error);
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .error-msg {
      font-size: 0.875rem;
      color: var(--error);
      line-height: 1.5;
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <!-- Film reel icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
      </div>
      <h1>Film Recommender</h1>
      <p>Personalised picks based on your Letterboxd diary</p>
    </div>

    <!-- Card -->
    <div class="card">

      <div class="card-label">Letterboxd username</div>

      <div class="input-row">
        <div class="input-wrap">
          <span class="input-at">@</span>
          <input
            id="username-input"
            type="text"
            placeholder="e.g. aayanr"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
          />
        </div>
        <button id="submit-btn" onclick="handleSubmit()">Recommend</button>
      </div>

      <!-- Loading state -->
      <div id="state-loading" class="state">
        <div class="divider"></div>
        <div class="loading-inner">
          <div class="spinner"></div>
          <div class="loading-text">
            <strong>Analysing your taste…</strong>
            Scraping diary &amp; running inference · 10–30 s
          </div>
        </div>
      </div>

      <!-- Results state -->
      <div id="state-results" class="state">
        <div class="divider"></div>
        <div class="results-header">
          Recommendations for <span id="results-username"></span>
        </div>
        <ol id="film-list" class="film-list"></ol>
      </div>

      <!-- Error state -->
      <div id="state-error" class="state">
        <div class="divider"></div>
        <div class="error-inner">
          <span class="error-icon">⚠</span>
          <div class="error-msg" id="error-msg"></div>
        </div>
      </div>

    </div><!-- .card -->

    <div class="footer">BERT4Rec · Letterboxd data · local model</div>

  </div><!-- .container -->

  <script>
    const STATES = ['loading', 'results', 'error'];

    function showState(name) {
      STATES.forEach(s => {
        document.getElementById(`state-${s}`).classList.toggle('visible', s === name);
      });
    }

    function hideAllStates() {
      STATES.forEach(s => document.getElementById(`state-${s}`).classList.remove('visible'));
    }

    function showResults(username, recs) {
      document.getElementById('results-username').textContent = `@${username}`;

      const list = document.getElementById('film-list');
      list.innerHTML = '';
      recs.forEach((title, i) => {
        const li = document.createElement('li');
        li.className = 'film-item';
        li.style.animationDelay = `${i * 30}ms`;
        li.innerHTML = `
          <span class="film-num">${i + 1}</span>
          <span class="film-title">${escapeHtml(title)}</span>
        `;
        list.appendChild(li);
      });

      showState('results');
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      showState('error');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function friendlyError(msg) {
      if (!msg) return 'Something went wrong. Please try again.';
      if (msg.startsWith('Model not trained yet')) return "The recommendation engine isn't ready yet.";
      return msg;
    }

    async function handleSubmit() {
      const input = document.getElementById('username-input');
      const btn   = document.getElementById('submit-btn');
      const username = input.value.trim().replace(/^@/, '');

      if (!username) {
        input.focus();
        return;
      }

      btn.disabled = true;
      showState('loading');

      try {
        const res  = await fetch('/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(friendlyError(data.error));
          return;
        }

        showResults(data.username, data.recommendations);

      } catch (err) {
        showError('Could not reach the server. Is "python app.py" running?');
      } finally {
        btn.disabled = false;
      }
    }

    // Allow submitting with Enter key
    document.getElementById('username-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>

</body>
</html>
