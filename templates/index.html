<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="container">
      <h1>Movie Recommender</h1>
      <p>Paste the final output from `questionnaire.py` below.</p>

      <form method="POST" action="/recommendations" class="form">
        <label for="username">Letterboxd Username</label>
        <input id="username" name="username" required />

        <label for="mood_summary">Mood Summary</label>
        <textarea id="mood_summary" name="mood_summary" rows="3" required></textarea>

        <label for="best_matches">Top 3 Picks (`best_matches`)</label>
        <textarea
          id="best_matches"
          name="best_matches"
          rows="8"
          required
          placeholder="1. **Movie Title** — reason..."
        ></textarea>

        <button type="submit">Show Recommendations</button>
      </form>
    </main>
  </body>
</html>
